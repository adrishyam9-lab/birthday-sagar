<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday ❤️</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      font-family: 'Poppins', sans-serif;
      color: white;
      overflow: hidden;
      flex-direction: column;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      opacity: 0;
      transition: opacity 1s ease;
    }

    #typing {
      margin-top: 10px;
      font-size: 1.2rem;
      color: #ffb6c1;
    }

    .cake {
      width: 200px;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .cake:hover {
      transform: scale(1.05);
    }

    .cut {
      animation: cutCake 1s forwards;
    }

    @keyframes cutCake {
      0% { transform: scale(1); }
      50% { transform: scale(0.9) rotate(-5deg); }
      100% { transform: scale(1) rotate(5deg); }
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }

  </style>
</head>
<body>

<div class="container">
  <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png" class="cake" id="cake">
  <h1 id="message">🎉 Happy Birthday My princess❤️ 🎉</h1>
  <div id="typing"></div>
</div>

<canvas id="fireworks"></canvas>

<script>
const cake = document.getElementById('cake');
const message = document.getElementById('message');
const typing = document.getElementById('typing');
const canvas = document.getElementById('fireworks');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

cake.addEventListener('click', () => {
  cake.classList.add('cut');
  message.style.opacity = 1;
  startFireworks();
  startTypingSequence();

  setTimeout(()=>{
    cake.style.display = 'none';
  },1000);
});

// ✅ multi-line typing (fixed)
const messages = [
  "Tum meri life ka sabse khoobsurat hissa ho 💖",
  "Tumhari smile meri duniya roshan kar deti hai 😊",
  "Aur main hamesha tumhare saath rehna chahta hoon ❤️",
 " Tum meri har khushi ki wajah ho.",
"Mujhe tumse baat karke sukoon milta hai.",
"Tum meri zindagi ka sabse pyara ehsaas ho.",
"Tumhari aankhon mein mujhe apni duniya dikhti hai.",
"Main har din bas tumhe aur zyada chahne lagta hoon",
"Tum meri har dua ka sabse haseen jawab ho.",
"Mujhe tum par hamesha proud feel hota hai.",
"Tum meri strength bhi ho aur meri weakness bhi.",
"Har pal tumhare saath bitana meri sabse badi khwahish hai.",
"Tumhari hasi meri sabse favorite awaaz hai.",
"Main tumhe kabhi khona nahi chahta.",
"Tum meri life ka sabse special gift ho.",
"Tumhari har baat mere dil ko choo jaati hai.",
"Mujhe tumse pyaar hai, aaj se nahi, hamesha se.",
"Tum meri kahani ka sabse khoobsurat part ho.",
"Main har janam mein tumhe hi chahunga.",
"Tum mere dil ke sabse kareeb ho.",
"Tumhare bina sab kuch adhoora lagta hai.",
"Meri duniya sirf tumse hi shuru hoti hai.",
"Aur tum par hi khatam hoti hai.",
"Aaj ke din bas itna kehna hai—",
"Thank you meri life mein aane ke liye ❤️",
"Happy Birthday once again meri love 💖",
];

let lineIndex = 0;
let charIndex = 0;

function startTypingSequence() {
  lineIndex = 0;
  showLine();
}

function showLine() {
  if (lineIndex >= messages.length) return;

  typing.innerHTML = "";
  charIndex = 0;

  function typeChar() {
    if (charIndex < messages[lineIndex].length) {
      typing.innerHTML += messages[lineIndex][charIndex];
      charIndex++;
      setTimeout(typeChar, 50);
    } else {
      setTimeout(() => {
        lineIndex++;
        showLine();
      }, 1500);
    }
  }

  typeChar();
}

function startFireworks() {
  for (let i = 0; i < 100; i++) {
    particles.push({
      x: canvas.width / 2,
      y: canvas.height / 2,
      radius: Math.random() * 3 + 1,
      color: `hsl(${Math.random() * 360}, 100%, 50%)`,
      speedX: (Math.random() - 0.5) * 6,
      speedY: (Math.random() - 0.5) * 6
    });
  }
  animate();
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach((p, index) => {
    p.x += p.speedX;
    p.y += p.speedY;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();

    if (p.radius > 0.2) p.radius -= 0.02;

    if (p.radius <= 0.2) particles.splice(index, 1);
  });

  requestAnimationFrame(animate);
}
</script>


<!-- 🎵 Background Music -->
<audio id="bgMusic" src="music2.mpeg" loop></audio>

<!-- 📸 Background Slideshow -->
<div class="slideshow">
  <img src="sagar9.jpeg" class="slide active">
  <img src="sagar8.jpeg" class="slide">
  <img src="sagar7.jpeg" class="slide">
  <img src="sagar6.jpeg" class="slide">
  <img src="sagar5.jpeg" class="slide">
  <img src="sagar4.jpeg" class="slide">
  <img src="sagar3.jpeg" class="slide">
  <img src="sagar2.jpeg" class="slide">
  <img src="sagar1.jpeg" class="slide">
  <img src="sagar10.jpeg" class="slide">
  <img src="sagar11.jpeg" class="slide">
  <img src="sagar12.jpeg" class="slide">
  <img src="sagar13.jpeg" class="slide">
  <img src="sagar14.jpeg" class="slide">
  <img src="sagar15.jpeg" class="slide">
</div>

<style>
.slideshow{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1}
.slide{position:absolute;width:100%;height:100%;object-fit:cover;opacity:0;transition:2s}
.slide.active{opacity:0.3}
</style>

<script>
// 🎵 music play on click
const bgMusic = document.getElementById('bgMusic');

cake.addEventListener('click', () => {
  bgMusic.play();
});

// 📸 slideshow logic
let slides = document.querySelectorAll('.slide');
let current = 0;
setInterval(() => {
  slides[current].classList.remove('active');
  current = (current + 1) % slides.length;
  slides[current].classList.add('active');
}, 3000);
</script>

</body>
</html>
